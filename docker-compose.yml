services:
  db:
    image: postgres:15-alpine
    container_name: social-ledger-db
    environment:
      POSTGRES_DB: socialledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - social-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d socialledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: social-ledger-api
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/socialledger
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - social-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: social-ledger-frontend
    environment:
      - API_HOST=api
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - social-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  social-network:
    driver: bridge

volumes:
  postgres_data: