apiVersion: v1
kind: Secret
metadata:
  name: {{ include "social-ledger.fullname" . }}-db-secret
  labels:
    {{- include "social-ledger.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-db:       {{ .Values.db.name     | b64enc | quote }}
  postgres-user:     {{ .Values.db.user     | b64enc | quote }}
  postgres-password: {{ .Values.db.password | b64enc | quote }}
